<div class="layout-wrapper">
  <aside class="sidebar" [class.active]="sidebarVisible()">
    <div class="logo">
      <h2>Inventario SNKFVR</h2>
      <button class="close-sidebar-btn" (click)="toggleSidebar()">
        <i class="pi pi-times"></i>
      </button>
    </div>
    <nav class="nav-menu">
      <a routerLink="/dashboard" routerLinkActive="active" (click)="closeSidebar()">
        <i class="pi pi-home"></i> Inicio
      </a>
      
      <a routerLink="/gastos" routerLinkActive="active" (click)="closeSidebar()">
        <i class="pi pi-dollar"></i> Compras / Gastos
      </a>
      <a routerLink="/ventas" routerLinkActive="active" (click)="closeSidebar()">
        <i class="pi pi-shopping-cart"></i> Ventas
      </a>
      <a routerLink="/ingresos" routerLinkActive="active" (click)="closeSidebar()">
        <i class="pi pi-arrow-down-left"></i> Ingresos
      </a>
      <a routerLink="/productos" routerLinkActive="active" (click)="closeSidebar()">
        <i class="pi pi-box"></i> Productos
      </a><a routerLink="/estadisticas" routerLinkActive="active" (click)="closeSidebar()">
        <i class="pi pi-chart-bar"></i> Estadísticas
      </a>
      <a routerLink="/usuarios" routerLinkActive="active" (click)="closeSidebar()">
        <i class="pi pi-users"></i> Usuarios
      </a>
      <a routerLink="/movimientos" routerLinkActive="active" (click)="closeSidebar()">
        <i class="pi pi-list"></i> Bitácora
      </a>
    </nav>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <button class="menu-toggle" (click)="toggleSidebar()">
        <i class="pi pi-bars"></i>
      </button>
      <div class="topbar-right">
        <span>Bienvenido, Admin</span>
      </div>
    </header>
    <main class="content" (click)="closeSidebar()">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
<p-toast position="bottom-center"></p-toast>

<div class="layout-wrapper">
  <aside class="sidebar" [class.active]="sidebarVisible()">
    <div class="logo">
      <h2>SNKFVR</h2>
      <button class="close-sidebar-btn" (click)="toggleSidebar()">
        <i class="pi pi-times"></i>
      </button>
    </div>
    <nav class="nav-menu">
      <span class="nav-section-label">Configuraciones del Sistema</span>
      <a routerLink="/usuarios" routerLinkActive="active" (click)="closeSidebar()">
        <i class="pi pi-users"></i> Usuarios
      </a>
      <a routerLink="/tipos-gasto" routerLinkActive="active" (click)="closeSidebar()">
        <i class="pi pi-tags"></i> Tipos de Gasto
      </a>
    </nav>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <!-- The hamburger menu is now hidden entirely on mobile as per requirements -->
      <button class="menu-toggle" (click)="toggleSidebar()" style="display: none;">
        <i class="pi pi-bars"></i>
      </button>
      <div class="topbar-title">SNKFVR</div>
      <div class="topbar-right" style="display: flex; align-items: center; gap: 1rem;">
        <div *ngIf="selectedUserId" style="display: flex; align-items: center; gap: 0.5rem; background: #f8fafc; padding: 0.25rem 0.75rem 0.25rem 0.25rem; border-radius: 30px; border: 1px solid #e2e8f0; cursor: pointer; transition: all 0.2s;" (click)="userMenu.toggle($event)" class="user-pill-hover">
            <div style="width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--primary-color), #ff7a85); display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 0.9rem;">
                {{ getSelectedUserInitial() }}
            </div>
            <div style="display: flex; flex-direction: column; line-height: 1.1;">
                <span style="font-weight: 700; font-size: 0.8rem; color: var(--text-color);">{{ getSelectedUserName() }}</span>
            </div>
        </div>
        <button class="sidebar-toggle-btn" (click)="toggleSidebar()" pTooltip="Menú" tooltipPosition="bottom">
          <i class="pi pi-cog"></i>
        </button>
      </div>
    </header>
    <main class="content" (click)="closeSidebar()">
      <router-outlet></router-outlet>
    </main>

    <nav class="bottom-bar">
      <a routerLink="/dashboard" routerLinkActive="active-tab" [routerLinkActiveOptions]="{exact: true}">
        <i class="pi pi-home"></i>
        <span>Inicio</span>
      </a>
      <a routerLink="/productos" routerLinkActive="active-tab">
        <i class="pi pi-box"></i>
        <span>Inventario</span>
      </a>
      <a routerLink="/ventas" routerLinkActive="active-tab">
        <i class="pi pi-bolt"></i>
        <span>Vender</span>
      </a>
      <a routerLink="/estadisticas" routerLinkActive="active-tab">
        <i class="pi pi-chart-line"></i>
        <span>Reportes</span>
      </a>


      <!-- More Options Button for Mobile -->
      <a (click)="mobileMenu.toggle($event)" class="bottom-bar-more-btn" style="cursor: pointer;">
        <i class="pi pi-ellipsis-h"></i>
        <span>Más</span>
      </a>
    </nav>
    <p-menu #mobileMenu [popup]="true" [model]="mobileMenuOptions" appendTo="body" styleClass="light-menu"></p-menu>
    <p-menu #userMenu [popup]="true" [model]="userMenuOptions" appendTo="body" styleClass="light-menu"></p-menu>
  </div>
</div>

<p-dialog [(visible)]="displayUserModal" [modal]="true" [closable]="false" [style]="{width: 'min(400px, 95vw)'}"
  header="Selecciona tu usuario" [draggable]="false" [resizable]="false">
  <div class="p-fluid" style="display: flex; flex-direction: column; gap: 1rem; margin-top: 1rem;">
    <div class="field">
      <label>Usuario</label>
      <p-select [options]="usuarios" [(ngModel)]="selectedUserId" optionLabel="nombre" optionValue="id"
        placeholder="Elige un usuario" styleClass="w-full" appendTo="body"></p-select>
    </div>
  </div>
  <ng-template pTemplate="footer">
    <p-button label="Ingresar" icon="pi pi-check" (onClick)="guardarUsuario()" [disabled]="!selectedUserId"></p-button>
  </ng-template>
</p-dialog>

<!-- Vista previa Resumen Diario -->
<p-dialog [(visible)]="displayResumenPreview" [modal]="true" [style]="{width: 'min(450px, 95vw)'}" header="Enviar Resumen Diario" [draggable]="false" [resizable]="false">
    <div style="background-color: #f8fafc; border-radius: 8px; padding: 1rem; font-family: monospace; white-space: pre-wrap; font-size: 0.85rem; border: 1px solid #e2e8f0; max-height: 350px; overflow-y: auto;">
        <div *ngIf="cargandoPreview" style="display: flex; justify-content: center; padding: 2rem;">
            <i class="pi pi-spin pi-spinner" style="font-size: 2rem; color: var(--primary-color);"></i>
        </div>
        <ng-container *ngIf="!cargandoPreview">
            {{ resumenPreviewText }}
        </ng-container>
    </div>
    <div style="margin-top: 1rem; font-size: 0.85rem; color: #64748b; display: flex; align-items: center; gap: 0.5rem;">
        <i class="pi pi-info-circle" style="color: #25d366;"></i>
        <span>Este reporte será enviado a tu número de WhatsApp.</span>
    </div>
    <ng-template pTemplate="footer">
        <p-button label="Cancelar" icon="pi pi-times" severity="secondary" [text]="true" (onClick)="displayResumenPreview = false" [disabled]="enviandoResumen"></p-button>
        <p-button label="Enviar por WhatsApp" icon="pi pi-whatsapp" severity="success" (onClick)="confirmarEnvioResumen()" [loading]="enviandoResumen"></p-button>
    </ng-template>
</p-dialog>

<p-toast position="bottom-center"></p-toast>

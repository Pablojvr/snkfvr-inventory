<div class="card">
    <div class="page-header">
        <div class="header-left">
            <h2>Ingresos de Dinero (Caja)</h2>
            <div class="product-search" style="width: 100%;">
                <div class="p-input-icon-left w-full" style="position: relative; display: flex; align-items: center; width: 100%;">
                    <i class="pi pi-search" style="position: absolute; left: 0.75rem; color: #94a3b8; z-index: 1;"></i>
                    <input pInputText type="text" [(ngModel)]="textoFiltro" (ngModelChange)="onFilterChange()" placeholder="Buscar por motivo o usuario..." style="width: 100%; padding-left: 2.5rem;" />
                </div>
            </div>
        </div>
        <p-button label="Nuevo Ingreso" icon="pi pi-plus" (onClick)="showDialog()" styleClass="w-full"></p-button>
    </div>

    <div class="entity-cards-grid" *ngIf="ingresosFiltrados.length > 0">
        <div class="entity-card" *ngFor="let ingreso of (ingresosFiltrados | slice:first:first+rows)">
            <div class="entity-card-header">
                <h4 class="entity-card-title">{{ ingreso.motivo }}</h4>
                <p-menu #menu [popup]="true" [model]="menuItems" appendTo="body"></p-menu>
                <button class="entity-card-menu-btn" (click)="toggleMenu($event, ingreso, menu)" pTooltip="Acciones" tooltipPosition="left">
                    <i class="pi pi-ellipsis-v"></i>
                </button>
            </div>
            <div class="entity-card-body">
                <div class="entity-card-meta">
                    <span><i class="pi pi-user" style="font-size: 0.75rem; margin-right: 0.25rem;"></i> {{ ingreso.usuarioNombre }}</span>
                    <span><i class="pi pi-calendar" style="font-size: 0.75rem; margin-right: 0.25rem;"></i> {{ ingreso.fecha | date:'dd/MM/yy' }}</span>
                </div>
                <div style="display: flex; flex-direction: column; align-items: flex-end; justify-content: flex-end;">
                    <span class="entity-card-amount" style="color: #10b981;">+{{ ingreso.monto | currency }}</span>
                </div>
            </div>
        </div>
    </div>
    
    <p-paginator *ngIf="ingresosFiltrados.length > 0" 
                 [first]="first" 
                 [rows]="rows" 
                 [totalRecords]="ingresosFiltrados.length" 
                 (onPageChange)="onPageChange($event)"
                 styleClass="mt-3">
    </p-paginator>

    <div *ngIf="ingresosFiltrados.length === 0" class="empty-msg">
        No hay ingresos registrados.
    </div>
</div>

<p-dialog [(visible)]="displayDialog" [modal]="true" [style]="{width: 'min(450px, 95vw)'}" [header]="editando ? 'Editar Ingreso' : 'Nuevo Ingreso'" [draggable]="false" [resizable]="false">
    <div class="p-fluid" style="display: flex; flex-direction: column; gap: 1rem; margin-top: 1rem;">
        <div class="field">
            <label for="motivo">Motivo</label>
            <input pInputText id="motivo" [(ngModel)]="ingreso.motivo" required autofocus 
                   [ngClass]="{'ng-invalid ng-dirty': submitted && !ingreso.motivo}" />
            <small class="p-error" *ngIf="submitted && !ingreso.motivo">El motivo es obligatorio.</small>
        </div>
        <div class="field">
            <label for="monto">Monto</label>
            <p-inputNumber id="monto" [(ngModel)]="ingreso.monto" mode="currency" currency="USD" locale="en-US" 
                           [ngClass]="{'ng-invalid ng-dirty': submitted && (!ingreso.monto || ingreso.monto <= 0)}"></p-inputNumber>
            <small class="p-error" *ngIf="submitted && (!ingreso.monto || ingreso.monto <= 0)">El monto es obligatorio y mayor a 0.</small>
        </div>
        <div class="field">
            <label for="fecha">Fecha</label>
            <p-datepicker id="fecha" [(ngModel)]="ingreso.fecha" appendTo="body" dateFormat="dd/mm/yy"></p-datepicker>
        </div>
        <div class="field" *ngIf="editando">
            <label for="usuarioId">Usuario (Opcional si edita otro)</label>
            <p-select id="usuarioId" [options]="usuarios" [(ngModel)]="ingreso.usuarioId" optionLabel="nombre" optionValue="id" appendTo="body"></p-select>
        </div>
    </div>
    
    <ng-template pTemplate="footer">
        <p-button label="Cancelar" icon="pi pi-times" [text]="true" (onClick)="displayDialog = false"></p-button>
        <p-button label="Guardar" icon="pi pi-check" (onClick)="guardar()" [loading]="guardando" [disabled]="guardando"></p-button>
    </ng-template>
</p-dialog>

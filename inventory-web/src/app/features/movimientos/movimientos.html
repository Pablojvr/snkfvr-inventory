<div class="card" style="padding: 1rem 0; border: none; box-shadow: none; background: transparent;">
    <div class="page-header" style="padding: 0 1rem;">
        <div class="header-left">
            <h2 style="font-weight: 800; color: #1e293b; margin-bottom: 0.5rem;">Control de Movimientos</h2>
            <div class="product-search" style="width: 100%; margin-bottom: 1rem;">
                <div class="p-input-icon-left w-full" style="position: relative; display: flex; align-items: center; width: 100%;">
                    <i class="pi pi-search" style="position: absolute; left: 0.75rem; color: #94a3b8; z-index: 1;"></i>
                    <input pInputText type="text" [(ngModel)]="textoFiltro" placeholder="Buscar movimientos..." style="width: 100%; padding-left: 2.5rem; border-radius: 20px; border: 1px solid #e2e8f0; background: #ffffff;" />
                </div>
            </div>
        </div>
    </div>

    <!-- Filters Scroll -->
    <div class="filters-container" style="display: flex; overflow-x: auto; gap: 0.5rem; padding: 0 1rem 1rem 1rem; scrollbar-width: none; -ms-overflow-style: none;">
        <button *ngFor="let cat of categorias" 
                (click)="setFiltro(cat.value)"
                [ngClass]="{'active': filtroTipoActivo === cat.value}"
                class="filter-chip">
            {{ cat.label }}
        </button>
    </div>

    <!-- Transaction List -->
    <div style="padding: 0 1rem;">
        <div *ngIf="movimientosFiltrados.length === 0" class="empty-msg" style="text-align: center; color: #64748b; padding: 2rem 0;">
            No se encontraron movimientos.
        </div>

        <div *ngFor="let mov of movimientosFiltrados" class="transaction-item" style="display: flex; align-items: center; padding: 1rem; background: #ffffff; border-radius: 20px; margin-bottom: 0.75rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02); transition: all 0.25s ease-in-out;">
            <!-- Icon -->
            <div class="transaction-icon" [style.background]="getColorPorMov(mov).bg" [style.color]="getColorPorMov(mov).text" style="width: 48px; height: 48px; min-width: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 1rem;">
                <i class="pi {{ getIconoPorMov(mov) }}" style="font-size: 1.25rem;"></i>
            </div>
            
            <!-- Details -->
            <div class="transaction-details" style="flex: 1; overflow: hidden; margin-right: 1rem;">
                <div [innerHTML]="mov.descripcion" style="font-weight: 600; font-size: 0.95rem; color: #1e293b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></div>
                <div style="font-size: 0.75rem; color: #64748b; margin-top: 0.2rem;">
                    {{ mov.descripcion.includes('ENV |') ? 'Envío' : (mov.tipo === 'Salida de dinero' ? 'Gasto' : mov.tipo) }} • {{ mov.fecha | date:'MMM d, y, h:mm a' }}
                </div>
            </div>

            <!-- Amount -->
            <div class="transaction-amount" [style.color]="mov.montoTotal > 0 ? '#10b981' : '#1e293b'" style="font-weight: 800; font-size: 1.05rem; white-space: nowrap;">
                {{ mov.montoTotal > 0 ? '+' : '' }}{{ mov.montoTotal | currency }}
            </div>
        </div>
    </div>
</div>

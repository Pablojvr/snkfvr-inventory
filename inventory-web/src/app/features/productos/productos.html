<div class="card" style="padding-top: 0; position: relative;">
    <div class="sticky-header" style="position: sticky; top: 0; background: white; z-index: 10; padding: 1rem 0; margin-bottom: 1rem;">
        <div style="display: flex; justify-content: space-between; width: 100%; align-items: center; margin-bottom: 1rem;">
            <h2 style="font-size: 1.8rem; font-weight: 800; color: var(--text-color); margin: 0;">Inventario</h2>
        </div>
        
        <div class="product-search" style="width: 100%; margin-bottom: 1rem;">
            <div class="p-input-icon-left w-full" style="position: relative; display: flex; align-items: center; width: 100%;">
                <i class="pi pi-search" style="position: absolute; left: 1rem; color: #94a3b8; z-index: 1; font-size: 1.1rem;"></i>
                <input pInputText type="text" [(ngModel)]="textoFiltro" (ngModelChange)="onFilterChange()" placeholder="Buscar producto o estado..." style="width: 100%; padding: 1rem 1rem 1rem 3rem; border-radius: 20px; border: 1px solid #e2e8f0; font-size: 1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.02);" />
            </div>
        </div>

        <!-- Filtros horizontales dinámicos -->
        <div style="display: flex; gap: 0.5rem; overflow-x: auto; padding-bottom: 0.5rem; width: 100%; -webkit-overflow-scrolling: touch;">
            <span (click)="setEstadoFiltro('Todos')" [ngStyle]="estadoFiltro === 'Todos' ? {'background': 'var(--primary-color)', 'color': 'white', 'box-shadow': '0 4px 10px rgba(255,71,87,0.3)'} : {'background': '#f1f5f9', 'color': '#64748b'}" style="padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.85rem; font-weight: 600; white-space: nowrap; cursor: pointer; transition: all 0.3s ease;">Todos</span>
            <span (click)="setEstadoFiltro('Disponible')" [ngStyle]="estadoFiltro === 'Disponible' ? {'background': 'var(--primary-color)', 'color': 'white', 'box-shadow': '0 4px 10px rgba(255,71,87,0.3)'} : {'background': '#f1f5f9', 'color': '#64748b'}" style="padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.85rem; font-weight: 600; white-space: nowrap; cursor: pointer; transition: all 0.3s ease;">Disponibles</span>
            <span (click)="setEstadoFiltro('Vendido')" [ngStyle]="estadoFiltro === 'Vendido' ? {'background': 'var(--primary-color)', 'color': 'white', 'box-shadow': '0 4px 10px rgba(255,71,87,0.3)'} : {'background': '#f1f5f9', 'color': '#64748b'}" style="padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.85rem; font-weight: 600; white-space: nowrap; cursor: pointer; transition: all 0.3s ease;">Vendidos</span>
            <span (click)="setEstadoFiltro('Reservado')" [ngStyle]="estadoFiltro === 'Reservado' ? {'background': 'var(--primary-color)', 'color': 'white', 'box-shadow': '0 4px 10px rgba(255,71,87,0.3)'} : {'background': '#f1f5f9', 'color': '#64748b'}" style="padding: 0.5rem 1rem; border-radius: 20px; font-size: 0.85rem; font-weight: 600; white-space: nowrap; cursor: pointer; transition: all 0.3s ease;">Reservados</span>
        </div>
    </div>

    <div class="entity-cards-grid" *ngIf="productosFiltrados.length > 0">
        <div class="entity-card" *ngFor="let prod of (productosFiltrados | slice:first:first+rows)" (click)="toggleMenu($event, prod, menu)">
            <div class="entity-card-header">
                <h4 class="entity-card-title">{{ prod.descripcion }}</h4>
                <p-menu #menu [popup]="true" [model]="menuItems" appendTo="body"></p-menu>
                <button class="entity-card-menu-btn" (click)="toggleMenu($event, prod, menu)" pTooltip="Acciones" tooltipPosition="left">
                    <i class="pi pi-ellipsis-v"></i>
                </button>
            </div>
            <div class="entity-card-body">
                <div class="entity-card-meta">
                    <span style="font-size: 0.8rem; color: #64748b; font-weight: 500;">Fecha de Ingreso: {{ prod.fechaCompra | date:'dd/MM/yy' }}</span>
                </div>
                <div style="display: flex; flex-direction: column; align-items: flex-end; justify-content: flex-end; gap: 0.25rem;">
                    <div style="text-align: right; margin-bottom: 0.5rem;">
                        <span style="font-size: 0.75rem; color: #64748b; display: block; line-height: 1;">Costo</span>
                        <span class="entity-card-amount" style="font-size: 1.15rem;">{{ prod.costoCalculado | currency }}</span>
                    </div>
                    <span [ngClass]="{'badge-success': prod.estado === 'Disponible', 'badge-warn': prod.estado === 'Reservado', 'badge-secondary': prod.estado === 'Vendido'}">
                        {{ prod.estado || 'Disponible' }}
                    </span>
                </div>
            </div>
            
            <div class="entity-card-actions" *ngIf="prod.estado !== 'Vendido'" style="display: flex; gap: 0.5rem; margin-top: 1rem; padding-top: 0.75rem; border-top: 1px solid #f1f5f9;">
                <p-button label="Vender" icon="pi pi-shopping-cart" size="small" [outlined]="true" (onClick)="registrarVenta(prod); $event.stopPropagation()" styleClass="w-full"></p-button>
                <p-button label="Comisión" icon="pi pi-dollar" size="small" [outlined]="true" severity="secondary" (onClick)="agregarComision(prod.id!); $event.stopPropagation()" styleClass="w-full"></p-button>
            </div>
        </div>
    </div>
    
    <p-paginator *ngIf="productosFiltrados.length > 0" 
                 [first]="first" 
                 [rows]="rows" 
                 [totalRecords]="productosFiltrados.length" 
                 (onPageChange)="onPageChange($event)"
                 styleClass="mt-3">
    </p-paginator>

    <div *ngIf="productosFiltrados.length === 0" class="empty-msg">
        No hay productos registrados.
    </div>

    <!-- Floating Action Button for New Product -->
    <button (click)="dialogGasto.showDialog(undefined, 1, undefined, true)" style="position: fixed; bottom: 85px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: var(--primary-color); color: white; border: none; box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4); display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 100; transition: transform 0.2s;">
        <i class="pi pi-plus" style="font-size: 1.5rem; font-weight: bold;"></i>
    </button>
</div>

<p-dialog [(visible)]="displayDialog" [modal]="true" [style]="{width: 'min(450px, 95vw)'}" [header]="editando ? 'Editar Producto' : 'Nuevo Producto'" [draggable]="false" [resizable]="false">
    <div class="p-fluid" style="display: flex; flex-direction: column; gap: 1rem; margin-top: 1rem;">
        <div class="field">
            <label for="descripcion" style="color: #64748b; font-size: 0.85rem; font-weight: 600;"><i class="pi pi-box" style="margin-right: 0.25rem;"></i> Descripción</label>
            <input pInputText id="descripcion" [(ngModel)]="producto.descripcion" required autofocus 
                   [ngClass]="{'ng-invalid ng-dirty': submitted && !producto.descripcion}" style="width: 100%;" />
            <small class="p-error" *ngIf="submitted && !producto.descripcion">La descripción es obligatoria.</small>
        </div>
        <div class="field">
            <label for="fechaCompra" style="color: #64748b; font-size: 0.85rem; font-weight: 600;"><i class="pi pi-calendar" style="margin-right: 0.25rem;"></i> Fecha de Compra</label>
            <p-datepicker id="fechaCompra" [(ngModel)]="producto.fechaCompra" appendTo="body" dateFormat="dd/mm/yy"></p-datepicker>
        </div>
    </div>
    
    <ng-template pTemplate="footer">
        <p-button label="Cancelar" icon="pi pi-times" [text]="true" (onClick)="displayDialog = false"></p-button>
        <p-button label="Guardar" icon="pi pi-check" severity="success" (onClick)="guardar()" [loading]="guardando" [disabled]="guardando"></p-button>
    </ng-template>
</p-dialog>

<!-- Gasto Modal -->
<app-dialog-gasto (onSaved)="cargarDatos()"></app-dialog-gasto>

<!-- Fin modales -->
<app-dialog-venta (onSaved)="cargarDatos()"></app-dialog-venta>

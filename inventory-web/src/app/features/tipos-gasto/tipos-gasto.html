<div class="card" style="padding: 2rem;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
        <h2 style="margin: 0; color: #1e293b;">Tipos de Gasto</h2>
        <p-button label="Nuevo Tipo" icon="pi pi-plus" (onClick)="showDialog()"></p-button>
    </div>

    <p-table [value]="tipos" [loading]="loading" [rowHover]="true" styleClass="p-datatable-striped">
        <ng-template pTemplate="header">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Sistema</th>
                <th style="width: 8rem; text-align: center;">Acciones</th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-tipo>
            <tr>
                <td>#{{tipo.id}}</td>
                <td style="font-weight: 600;">{{tipo.nombre}}</td>
                <td>
                    <p-tag *ngIf="tipo.esSistema" severity="info" value="Sistema"></p-tag>
                    <p-tag *ngIf="!tipo.esSistema" severity="success" value="Personalizado"></p-tag>
                </td>
                <td>
                    <div style="display: flex; gap: 0.5rem; justify-content: center;">
                        <p-button icon="pi pi-pencil" [text]="true" [rounded]="true" severity="info" (onClick)="editar(tipo)"></p-button>
                        <p-button icon="pi pi-trash" [text]="true" [rounded]="true" severity="danger" (onClick)="eliminar(tipo.id, tipo.esSistema)" [disabled]="tipo.esSistema"></p-button>
                    </div>
                </td>
            </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="4" style="text-align: center; padding: 2rem;">No hay tipos de gasto registrados.</td>
            </tr>
        </ng-template>
    </p-table>
</div>

<!-- Dialog para Crear/Editar -->
<p-dialog [(visible)]="displayDialog" [modal]="true" [style]="{width: '400px'}" [header]="editando ? 'Editar Tipo' : 'Nuevo Tipo'">
    <div class="p-fluid" style="margin-top: 1rem;">
        <div class="field">
            <label for="nombre">Nombre</label>
            <input pInputText id="nombre" [(ngModel)]="tipoActual.nombre" required autofocus 
                   [ngClass]="{'ng-invalid ng-dirty': submitted && !tipoActual.nombre}" />
            <small class="p-error" *ngIf="submitted && !tipoActual.nombre">El nombre es obligatorio.</small>
        </div>
        
        <p-message *ngIf="editando && tipoActual.esSistema" severity="info" text="Estás editando el nombre de un tipo de sistema. Ten en cuenta que la lógica base del sistema lo utiliza." styleClass="w-full mt-3"></p-message>
    </div>
    
    <ng-template pTemplate="footer">
        <p-button label="Cancelar" icon="pi pi-times" [text]="true" (onClick)="displayDialog = false"></p-button>
        <p-button label="Guardar" icon="pi pi-check" (onClick)="guardar()" [loading]="guardando"></p-button>
    </ng-template>
</p-dialog>

<p-confirmDialog [style]="{width: '450px'}"></p-confirmDialog>

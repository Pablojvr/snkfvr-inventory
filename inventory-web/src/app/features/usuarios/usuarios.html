<div class="card">
    <div class="page-header">
        <div class="header-left">
            <h2>Gestión de Usuarios</h2>
        </div>
        <p-button label="Nuevo Usuario" icon="pi pi-plus" (onClick)="mostrarModal()" styleClass="w-full"></p-button>
    </div>

    <div class="entity-cards-grid" *ngIf="usuarios.length > 0">
        <div class="entity-card" *ngFor="let usuario of usuarios">
            <div class="entity-card-header">
                <div style="display: flex; align-items: center; gap: 0.5rem; flex: 1;">
                    <i class="pi pi-user" style="font-size: 1.25rem; color: #64748b;"></i>
                    <h4 class="entity-card-title">{{ usuario.nombre }}</h4>
                </div>
                <p-menu #menu [popup]="true" [model]="menuItems" appendTo="body"></p-menu>
                <button class="entity-card-menu-btn" (click)="toggleMenu($event, usuario, menu)" pTooltip="Acciones" tooltipPosition="left">
                    <i class="pi pi-ellipsis-v"></i>
                </button>
            </div>
            <div class="entity-card-body" style="justify-content: flex-start; margin-top: 1rem;">
                <span class="badge-success" *ngIf="usuarioActivoId === usuario.id">Predeterminado</span>
                <span class="badge-secondary" *ngIf="usuarioActivoId !== usuario.id">ID: {{ usuario.id }}</span>
            </div>
        </div>
    </div>
    
    <div *ngIf="usuarios.length === 0" class="empty-msg">
        No hay usuarios registrados.
    </div>
</div>

<p-dialog [(visible)]="displayModal" [modal]="true" [style]="{width: 'min(450px, 95vw)'}" [header]="editando ? 'Editar Usuario' : 'Nuevo Usuario'" [draggable]="false" [resizable]="false">
    <div class="p-fluid" style="display: flex; flex-direction: column; gap: 1rem; margin-top: 1rem;">
        <div class="field">
            <label for="nombre">Nombre</label>
            <input pInputText id="nombre" [(ngModel)]="nuevoUsuario.nombre" required autofocus 
                   [ngClass]="{'ng-invalid ng-dirty': submitted && (!nuevoUsuario.nombre || !nuevoUsuario.nombre.trim())}" />
            <small class="p-error" *ngIf="submitted && (!nuevoUsuario.nombre || !nuevoUsuario.nombre.trim())">El nombre es obligatorio.</small>
        </div>
    </div>
    <ng-template pTemplate="footer">
        <p-button label="Cancelar" icon="pi pi-times" [text]="true" (onClick)="displayModal=false"></p-button>
        <p-button label="Guardar" icon="pi pi-check" (onClick)="guardarUsuario()" [loading]="guardando" [disabled]="guardando"></p-button>
    </ng-template>
</p-dialog>

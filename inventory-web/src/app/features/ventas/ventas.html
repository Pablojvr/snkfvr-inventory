<div class="card">
    <div class="page-header">
        <div class="header-left">
            <h2>Ventas (Inventario)</h2>
            <div class="product-search" style="width: 100%; display: flex; flex-direction: column; gap: 0.5rem;">
                <div class="p-input-icon-left w-full" style="position: relative; display: flex; align-items: center; width: 100%;">
                    <i class="pi pi-search" style="position: absolute; left: 0.75rem; color: #94a3b8; z-index: 1;"></i>
                    <input pInputText type="text" [(ngModel)]="textoFiltro" (ngModelChange)="onFilterChange()" placeholder="Buscar producto o comprador..." style="width: 100%; padding-left: 2.5rem;" />
                </div>
                <div style="display: flex; gap: 0.5rem; width: 100%; overflow-x: auto;">
                    <p-button [label]="'Todos'" size="small" [severity]="estadoFiltro === 'Todos' ? 'primary' : 'secondary'" [outlined]="estadoFiltro !== 'Todos'" (onClick)="setEstadoFiltro('Todos')"></p-button>
                    <p-button [label]="'Disponibles'" size="small" [severity]="estadoFiltro === 'Disponible' ? 'info' : 'secondary'" [outlined]="estadoFiltro !== 'Disponible'" (onClick)="setEstadoFiltro('Disponible')"></p-button>
                    <p-button [label]="'Reservados'" size="small" [severity]="estadoFiltro === 'Reservado' ? 'warn' : 'secondary'" [outlined]="estadoFiltro !== 'Reservado'" (onClick)="setEstadoFiltro('Reservado')"></p-button>
                    <p-button [label]="'Vendidos'" size="small" [severity]="estadoFiltro === 'Vendido' ? 'success' : 'secondary'" [outlined]="estadoFiltro !== 'Vendido'" (onClick)="setEstadoFiltro('Vendido')"></p-button>
                </div>
            </div>
        </div>
    </div>

    <div class="entity-cards-grid" *ngIf="productosFiltrados.length > 0">
        <div class="entity-card" *ngFor="let producto of productosFiltrados" (click)="toggleMenu($event, producto, menu)">
            <div class="entity-card-header">
                <h4 class="entity-card-title">{{ producto.descripcion }}</h4>
                <p-menu #menu [popup]="true" [model]="menuItems" appendTo="body"></p-menu>
                <button class="entity-card-menu-btn" (click)="toggleMenu($event, producto, menu)" pTooltip="Acciones" tooltipPosition="left">
                    <i class="pi pi-ellipsis-v"></i>
                </button>
            </div>
            <div class="entity-card-body">
                <div class="entity-card-meta">
                    <span style="font-weight: bold; color: #64748b;">Costo Calculado: {{ producto.costoCalculado | currency }}</span>
                    <span *ngIf="producto.estadoActual !== 'Disponible'"><i class="pi pi-user" style="font-size: 0.75rem; margin-right: 0.25rem;"></i> {{ producto.nombreComprador || 'Sin nombre' }}</span>
                    <span *ngIf="producto.estadoActual !== 'Disponible' && producto.lugarDestino"><i class="pi pi-map-marker" style="font-size: 0.75rem; margin-right: 0.25rem;"></i> {{ producto.lugarDestino }}</span>
                </div>
                <div style="display: flex; flex-direction: column; align-items: flex-end; justify-content: flex-end; gap: 0.5rem;">
                    <span *ngIf="producto.estadoActual !== 'Disponible'" class="entity-card-amount" style="color: #3b82f6;">{{ producto.precioVenta | currency }}</span>
                    
                    <span [ngClass]="producto.estadoActual === 'Vendido' ? 'badge-success' : (producto.estadoActual === 'Reservado' ? 'badge-warn' : 'badge-primary')">{{ producto.estadoActual }}</span>
                </div>
            </div>
        </div>
    </div>
    
    <div *ngIf="productosFiltrados.length === 0" class="empty-msg">
        No hay productos encontrados en este estado.
    </div>
</div>

<!-- Floating Action Button for New Sale -->
<p-button icon="pi pi-plus" [rounded]="true" size="large" severity="success" 
    [style]="{'position': 'fixed', 'bottom': '5rem', 'right': '1.5rem', 'width': '4rem', 'height': '4rem', 'box-shadow': '0 4px 10px rgba(0,0,0,0.3)', 'z-index': '1000'}" 
    (onClick)="nuevaVentaRapida()">
</p-button>

<!-- Modal Registrar Venta Compartido -->
<app-dialog-venta (onSaved)="cargarDatos()"></app-dialog-venta>

<p-dialog [(visible)]="displayDialog" [modal]="true" [style]="{width: '450px'}" [header]="editando ? 'Editar Gasto/Compra' : 'Registrar Gasto/Compra'">
    <div class="p-fluid" style="display: flex; flex-direction: column; gap: 1rem; margin-top: 1rem;">
        
        <!-- Producto como título (read-only) cuando viene pre-seleccionado -->
        <div *ngIf="prefilledProducto && productoNombre" style="background: #f1f5f9; padding: 0.75rem 1rem; border-radius: 8px; border-left: 4px solid #3b82f6;">
            <small style="color: #64748b; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;">Producto</small>
            <div style="font-weight: 700; font-size: 1.05rem; color: #1e293b; margin-top: 0.15rem;">{{ productoNombre }}</div>
        </div>

        <div class="field" *ngIf="!editando && !prefilledProducto && !soloProducto">
            <label for="tipoGasto" style="color: #64748b; font-size: 0.85rem; font-weight: 600;"><i class="pi pi-list" style="margin-right: 0.25rem;"></i> Tipo de Registro</label>
            <p-select id="tipoGasto" [options]="tiposGasto" [(ngModel)]="gasto.tipoGastoId" optionLabel="nombre" optionValue="id" appendTo="body" (onChange)="onTipoChange()"></p-select>
        </div>
        
        <!-- Selector de producto solo cuando NO viene pre-seleccionado y es Comisión/Envío -->
        <div class="field" *ngIf="!prefilledProducto && (tipoNombreActual === 'Comisión' || tipoNombreActual === 'Envío' || (editando && gasto.productoId))">
            <label for="productoId" style="color: #64748b; font-size: 0.85rem; font-weight: 600;"><i class="pi pi-box" style="margin-right: 0.25rem;"></i> Producto Relacionado</label>
            <p-select id="productoId" [options]="productos" [(ngModel)]="gasto.productoId" optionLabel="descripcion" 
                      [filter]="true" filterBy="descripcion" [showClear]="true" placeholder="Seleccionar producto..." appendTo="body"
                      (onChange)="onTipoChange()"
                      [ngClass]="{'ng-invalid ng-dirty': submitted && !gasto.productoId}">
                <ng-template let-prod pTemplate="item">
                    <div>{{prod.descripcion}} - {{prod.estado || 'Disponible'}}</div>
                </ng-template>
            </p-select>
            <small class="p-error" *ngIf="submitted && !gasto.productoId">Debe seleccionar un producto.</small>
        </div>

        <div class="field">
            <label for="motivo" style="color: #64748b; font-size: 0.85rem; font-weight: 600;"><i class="pi pi-align-left" style="margin-right: 0.25rem;"></i> Motivo / Descripción</label>
            <div style="display: flex; gap: 0.5rem; align-items: stretch;">
                <input pInputText id="motivo" [(ngModel)]="gasto.motivo" required autofocus 
                       [readonly]="tipoNombreActual === 'Comisión' || tipoNombreActual === 'Envío'"
                       [ngClass]="{'ng-invalid ng-dirty': submitted && !gasto.motivo}" style="flex: 1;" />
                
                <input type="file" accept="image/*" capture="environment" style="display: none" #fileInput (change)="procesarImagenSeleccionada($event)" *ngIf="tipoNombreActual === 'Producto'">
                <p-button icon="pi pi-camera" styleClass="p-button-outlined p-button-secondary" (onClick)="fileInput.click()" pTooltip="Escanear viñeta (IA)" [loading]="escaneando" [disabled]="escaneando" *ngIf="tipoNombreActual === 'Producto'"></p-button>
            </div>
            <small class="p-error" *ngIf="submitted && !gasto.motivo">El motivo es obligatorio.</small>
        </div>
        
        <div class="field">
            <div style="display: flex; justify-content: space-between; align-items: baseline;">
                <label for="monto" style="color: #1e293b; font-size: 0.95rem; font-weight: 700;"><i class="pi pi-dollar" style="margin-right: 0.25rem;"></i> Monto (Costo)</label>
                <small *ngIf="costoActual !== undefined" style="color: #64748b; font-weight: 600;">(Costo actual: {{ costoActual | currency }})</small>
            </div>
            <p-inputNumber id="monto" [(ngModel)]="gasto.monto" mode="currency" currency="USD" locale="en-US" 
                           [ngClass]="{'ng-invalid ng-dirty': submitted && (!gasto.monto || gasto.monto <= 0)}"></p-inputNumber>
            <small class="p-error" *ngIf="submitted && (!gasto.monto || gasto.monto <= 0)">El monto es obligatorio y mayor a 0.</small>
        </div>

        <div class="field">
            <label for="fecha" style="color: #64748b; font-size: 0.85rem; font-weight: 600;"><i class="pi pi-calendar" style="margin-right: 0.25rem;"></i> Fecha del Gasto</label>
            <p-datepicker id="fecha" [(ngModel)]="gasto.fecha" appendTo="body" dateFormat="dd/mm/yy"></p-datepicker>
        </div>
        
        <div class="field" *ngIf="tipoNombreActual === 'Producto' || (editando && !gasto.productoId)">
            <label for="fechaIngreso" style="color: #64748b; font-size: 0.85rem; font-weight: 600;"><i class="pi pi-calendar-plus" style="margin-right: 0.25rem;"></i> Fecha de Ingreso del Producto <span style="opacity:0.6;">(Opcional)</span></label>
            <p-datepicker id="fechaIngreso" [(ngModel)]="gasto.fechaIngreso" appendTo="body" dateFormat="dd/mm/yy"></p-datepicker>
        </div>

        <!-- Usuario -->
        <div class="field" *ngIf="editando || tipoNombreActual === 'Comisión'">
            <label for="usuarioId" style="color: #64748b; font-size: 0.85rem; font-weight: 600;"><i class="pi pi-user" style="margin-right: 0.25rem;"></i> {{ tipoNombreActual === 'Comisión' ? 'Usuario Comisionista' : 'Registrado por' }}</label>
            <p-select id="usuarioId" [options]="usuarios" [(ngModel)]="gasto.usuarioId" optionLabel="nombre" optionValue="id" appendTo="body"
                      [ngClass]="{'ng-invalid ng-dirty': submitted && !gasto.usuarioId}"></p-select>
            <small class="p-error" *ngIf="submitted && !gasto.usuarioId">El usuario es obligatorio.</small>
        </div>
        
        <!-- COMISION PARA ALE (Opcional) solo en compra de Producto -->
        <div class="field" *ngIf="tipoNombreActual === 'Producto'" style="background-color: #f8fafc; padding: 1rem; border-radius: 8px; border: 1px solid #e2e8f0; margin-top: 0.5rem;">
            <label style="color: #f59e0b; font-weight: 600;"><i class="pi pi-money-bill" style="margin-right: 0.25rem;"></i> Comisión Asignada (Opcional)</label>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 0.5rem;">
                <div>
                    <label style="font-size: 0.85rem; color: #64748b; margin-bottom: 0.25rem; display: block;">Usuario Responsable</label>
                    <p-select [options]="usuarios" [(ngModel)]="gasto.comisionUsuarioId" optionLabel="nombre" optionValue="id" appendTo="body" styleClass="w-full"></p-select>
                </div>
                <div>
                    <label style="font-size: 0.85rem; color: #64748b; margin-bottom: 0.25rem; display: block;">Monto de Comisión</label>
                    <p-inputNumber [(ngModel)]="gasto.comisionMonto" mode="currency" currency="USD" locale="en-US" styleClass="w-full" placeholder="Ej. $10.00"></p-inputNumber>
                </div>
            </div>
        </div>
    </div>
    
    <ng-template pTemplate="footer">
        <p-button label="Cancelar" icon="pi pi-times" [text]="true" (onClick)="displayDialog = false"></p-button>
        <p-button label="Guardar" icon="pi pi-check" severity="success" (onClick)="guardar()" [loading]="guardando" [disabled]="guardando"></p-button>
    </ng-template>
</p-dialog>

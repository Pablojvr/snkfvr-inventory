<p-dialog [(visible)]="displayDialog" [modal]="true" [style]="{width: '450px'}" [header]="editando ? 'Editar Gasto/Compra' : 'Registrar Gasto/Compra'">
    <div class="p-fluid" style="display: flex; flex-direction: column; gap: 1rem; margin-top: 1rem;">
        
        <!-- Producto como título (read-only) cuando viene pre-seleccionado -->
        <div *ngIf="prefilledProducto && productoNombre" style="background: #f1f5f9; padding: 0.75rem 1rem; border-radius: 8px; border-left: 4px solid #3b82f6;">
            <small style="color: #64748b; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;">Producto</small>
            <div style="font-weight: 700; font-size: 1.05rem; color: #1e293b; margin-top: 0.15rem;">{{ productoNombre }}</div>
        </div>

        <div class="field" *ngIf="!editando && !prefilledProducto">
            <label for="tipo">Tipo de Registro</label>
            <p-select id="tipo" [options]="tiposGasto" [(ngModel)]="gasto.tipo" appendTo="body" (onChange)="onTipoChange()"></p-select>
        </div>
        
        <!-- Selector de producto solo cuando NO viene pre-seleccionado y es Comisión/Envío -->
        <div class="field" *ngIf="!prefilledProducto && (gasto.tipo === 'Comisión' || gasto.tipo === 'Envío' || (editando && gasto.productoId))">
            <label for="productoId">Producto Relacionado</label>
            <p-select id="productoId" [options]="productos" [(ngModel)]="gasto.productoId" optionLabel="descripcion" 
                      [filter]="true" filterBy="descripcion" [showClear]="true" placeholder="Seleccionar producto..." appendTo="body"
                      (onChange)="onTipoChange()"
                      [ngClass]="{'ng-invalid ng-dirty': submitted && !gasto.productoId}">
                <ng-template let-prod pTemplate="item">
                    <div>{{prod.descripcion}} - {{prod.estado || 'Disponible'}}</div>
                </ng-template>
            </p-select>
            <small class="p-error" *ngIf="submitted && !gasto.productoId">Debe seleccionar un producto.</small>
        </div>

        <div class="field">
            <label for="motivo">Motivo / Descripción</label>
            <input pInputText id="motivo" [(ngModel)]="gasto.motivo" required autofocus 
                   [readonly]="gasto.tipo === 'Comisión' || gasto.tipo === 'Envío'"
                   [ngClass]="{'ng-invalid ng-dirty': submitted && !gasto.motivo}" />
            <small class="p-error" *ngIf="submitted && !gasto.motivo">El motivo es obligatorio.</small>
        </div>
        
        <div class="field">
            <div style="display: flex; justify-content: space-between; align-items: baseline;">
                <label for="monto">Monto (Costo)</label>
                <small *ngIf="costoActual !== undefined" style="color: #64748b; font-weight: 600;">(Costo actual: {{ costoActual | currency }})</small>
            </div>
            <p-inputNumber id="monto" [(ngModel)]="gasto.monto" mode="currency" currency="USD" locale="en-US" 
                           [ngClass]="{'ng-invalid ng-dirty': submitted && (!gasto.monto || gasto.monto <= 0)}"></p-inputNumber>
            <small class="p-error" *ngIf="submitted && (!gasto.monto || gasto.monto <= 0)">El monto es obligatorio y mayor a 0.</small>
        </div>

        <div class="field">
            <label for="fecha">Fecha del Gasto</label>
            <p-datepicker id="fecha" [(ngModel)]="gasto.fecha" appendTo="body" dateFormat="dd/mm/yy"></p-datepicker>
        </div>
        
        <div class="field" *ngIf="gasto.tipo === 'Calzado' || (editando && !gasto.productoId)">
            <label for="fechaIngreso">Fecha de Ingreso del Producto (Opcional)</label>
            <p-datepicker id="fechaIngreso" [(ngModel)]="gasto.fechaIngreso" appendTo="body" dateFormat="dd/mm/yy"></p-datepicker>
        </div>

        <!-- Usuario oculto: se toma de localStorage. Solo visible al editar. -->
        <div class="field" *ngIf="editando">
            <label for="usuarioId">Registrado por</label>
            <p-select id="usuarioId" [options]="usuarios" [(ngModel)]="gasto.usuarioId" optionLabel="nombre" optionValue="id" appendTo="body"
                      [ngClass]="{'ng-invalid ng-dirty': submitted && !gasto.usuarioId}"></p-select>
            <small class="p-error" *ngIf="submitted && !gasto.usuarioId">El usuario es obligatorio.</small>
        </div>
    </div>
    
    <ng-template pTemplate="footer">
        <p-button label="Cancelar" icon="pi pi-times" [text]="true" (onClick)="displayDialog = false"></p-button>
        <p-button label="Guardar" icon="pi pi-check" (onClick)="guardar()" [loading]="guardando" [disabled]="guardando"></p-button>
    </ng-template>
</p-dialog>
